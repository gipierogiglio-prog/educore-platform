# Azure Pipelines — EduCore Platform
# Build → Test → Docker Image → Deploy

trigger:
  branches:
    include:
      - main

variables:
  - group: educore-platform-vars
  - name: DOTNET_SYSTEM_GLOBALIZATION_INVARIANT
    value: 1
  - name: DOKPLOY_URL
    value: "https://dokploy.devgiglio.com"
  - name: IMAGE_NAME
    value: "ghcr.io/gipierogiglio-prog/educore-platform"

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: "🔨 Build"
    jobs:
      - job: Build
        displayName: "Build + Test + Docker"
        steps:
          - checkout: self
            persistCredentials: true

          # Build .NET
          - task: DotNetCoreCLI@2
            displayName: "📦 Restore"
            inputs:
              command: restore
              projects: "**/*.csproj"
          - task: DotNetCoreCLI@2
            displayName: "🔨 Build"
            inputs:
              command: build
              projects: "**/*.csproj"
              arguments: "--configuration Release --no-restore"

          # Run tests
          - task: DotNetCoreCLI@2
            displayName: "🧪 Testes SQLite"
            inputs:
              command: test
              projects: "tests/Financial.IntegrationTests/EduCore.Financial.IntegrationTests.csproj"
              arguments: >
                --configuration Release --no-restore
                --filter "FullyQualifiedName!~Postgres"

          # Publish
          - task: DotNetCoreCLI@2
            displayName: "📦 Publish"
            inputs:
              command: publish
              publishWebProjects: false
              projects: "src/api/Gateway/Educore.Api.csproj"
              arguments: "--configuration Release --no-build --output $(Build.ArtifactStagingDirectory)/app"

          # Copy Dockerfile to publish output
          - script: |
              cp Dockerfile.prod $(Build.ArtifactStagingDirectory)/app/Dockerfile
            displayName: "📄 Copy Dockerfile"

          # Build Docker image
          - task: Docker@2
            displayName: "🐳 Build Docker Image"
            inputs:
              command: buildAndPush
              repository: $(IMAGE_NAME)
              dockerfile: "$(Build.ArtifactStagingDirectory)/app/Dockerfile"
              tags: latest
              containerRegistry: ghcr-connection

  - stage: DeployHML
    displayName: "🚀 Deploy HML"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployHML
        displayName: "hml-platform.devgiglio.uk"
        steps:
          - script: |
              curl -s -X POST "$(DOKPLOY_URL)/api/application.deploy" \
                -H "x-api-key: $(DOKPLOY_API_KEY)" \
                -H "Content-Type: application/json" \
                -d '{"applicationId":"$(HML_APP_ID)"}'
              echo "✅ HML deploy OK"
            displayName: "Deploy HML"

  - stage: DeployPROD
    displayName: "🌟 Deploy PROD"
    dependsOn: DeployHML
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployPROD
        displayName: "platform.devgiglio.uk"
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    curl -s -X POST "$(DOKPLOY_URL)/api/application.deploy" \
                      -H "x-api-key: $(DOKPLOY_API_KEY)" \
                      -H "Content-Type: application/json" \
                      -d '{"applicationId":"$(PROD_APP_ID)"}'
                    echo "✅ PROD deploy OK"
                  displayName: "Deploy PROD"
