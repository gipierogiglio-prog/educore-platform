# Azure Pipelines — EduCore Platform
# Build → Test → Docker Push → SSH Deploy (HML + PROD)

trigger:
  branches:
    include:
      - main

variables:
  - group: educore-platform-vars
  - name: DOTNET_SYSTEM_GLOBALIZATION_INVARIANT
    value: 1

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: "🔨 Build"
    jobs:
      - job: Build
        displayName: "Build + Test + Docker Push"
        steps:
          - checkout: self

          - task: DotNetCoreCLI@2
            displayName: "📦 Restore"
            inputs:
              command: restore
              projects: "**/*.csproj"

          - task: DotNetCoreCLI@2
            displayName: "🔨 Build"
            inputs:
              command: build
              projects: "**/*.csproj"
              arguments: "--configuration Release --no-restore"

          - task: DotNetCoreCLI@2
            displayName: "🧪 Testes SQLite"
            inputs:
              command: test
              projects: "tests/Financial.IntegrationTests/EduCore.Financial.IntegrationTests.csproj"
              arguments: >
                --configuration Release --no-restore
                --filter "FullyQualifiedName!~Postgres"

          - task: DotNetCoreCLI@2
            displayName: "📦 Publish"
            inputs:
              command: publish
              publishWebProjects: false
              projects: "src/api/Gateway/Educore.Api.csproj"
              arguments: "--configuration Release --no-build --output $(Build.ArtifactStagingDirectory)/app"

          - script: |
              cp Dockerfile.prod $(Build.ArtifactStagingDirectory)/app/Dockerfile
              cd $(Build.ArtifactStagingDirectory)/app
              echo "$(GH_PAT)" | docker login ghcr.io -u gipierogiglio-prog --password-stdin
              docker build -t $(IMAGE_NAME):latest .
              docker push $(IMAGE_NAME):latest
              echo "✅ Imagem no ghcr.io!"
            displayName: "🐳 Build & Push Docker"
            env:
              GH_PAT: $(GH_PAT)

  - stage: DeployHML
    displayName: "🚀 Deploy HML"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployHML
        displayName: "hml-platform.devgiglio.uk"
        steps:
          - script: |
              echo "🔧 Instalando sshpass..."
              sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
              echo "🚀 Deploy HML via SSH..."
              sshpass -p '$(SSH_PASSWORD)' ssh -o StrictHostKeyChecking=no $(SSH_USER)@$(SSH_HOST) "docker pull $(IMAGE_NAME):latest && docker stop educore-hml 2>/dev/null || true && docker rm educore-hml 2>/dev/null || true && docker run -d --name educore-hml --restart unless-stopped --network dokploy-network -l traefik.enable=true -l traefik.http.routers.educore-hml.rule=Host(\"hml-platform.devgiglio.uk\") -l traefik.http.routers.educore-hml.entrypoints=websecure -l traefik.http.services.educore-hml.loadbalancer.server.port=8080 -l traefik.http.routers.educore-hml.tls.certresolver=letsencrypt $(IMAGE_NAME):latest"
              echo "✅ HML OK"
            displayName: "SSH Deploy HML"

  - stage: DeployPROD
    displayName: "🌟 Deploy PROD"
    dependsOn: DeployHML
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployPROD
        displayName: "platform.devgiglio.uk"
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "🌟 Deploy PROD via SSH..."
                    sshpass -p '$(SSH_PASSWORD)' ssh -o StrictHostKeyChecking=no $(SSH_USER)@$(SSH_HOST) "docker pull $(IMAGE_NAME):latest && docker stop educore-platform 2>/dev/null || true && docker rm educore-platform 2>/dev/null || true && docker run -d --name educore-platform --restart unless-stopped --network dokploy-network -l traefik.enable=true -l traefik.http.routers.educore-platform.rule=Host(\"platform.devgiglio.uk\") -l traefik.http.routers.educore-platform.entrypoints=websecure -l traefik.http.services.educore-platform.loadbalancer.server.port=8080 -l traefik.http.routers.educore-platform.tls.certresolver=letsencrypt $(IMAGE_NAME):latest"
                    echo "✅ PROD OK"
                  displayName: "SSH Deploy PROD"
