# Azure Pipelines — EduCore Platform
# Pipeline: Build -> Test -> Deploy (HML + PROD)
# Checkout manual com PAT para bypassar service connection

trigger:
  branches:
    include:
      - main

variables:
  - group: educore-platform-vars
  - name: DOTNET_SYSTEM_GLOBALIZATION_INVARIANT
    value: 1
  - name: DOKPLOY_URL
    value: "https://dokploy.devgiglio.com"
  - name: PROD_APP_ID
    value: "EkPqlYG11SnA8Kw7q0wMH"
  - name: HML_APP_ID
    value: "9hMNEOpTN5eh-SZ2oTXJR"

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: "🔨 Build"
    jobs:
      - job: Build
        displayName: "Build + Publish"
        steps:
          - checkout: none
          - script: |
              echo "📥 Clonando repositório..."
              git clone --branch main --depth 1 \
                https://x-access-token:$(GH_PAT)@github.com/gipierogiglio-prog/educore-platform.git .
              echo "✅ Clone concluído"
            displayName: "📥 Git Clone"
            env:
              GH_PAT: $(GH_PAT)
          - task: DotNetCoreCLI@2
            displayName: "📦 Restore"
            inputs:
              command: restore
              projects: "**/*.csproj"
          - task: DotNetCoreCLI@2
            displayName: "🔨 Build"
            inputs:
              command: build
              projects: "**/*.csproj"
              arguments: "--configuration Release --no-restore"
          - task: DotNetCoreCLI@2
            displayName: "📦 Publish"
            inputs:
              command: publish
              publishWebProjects: false
              projects: "src/api/Gateway/Educore.Api.csproj"
              arguments: "--configuration Release --no-build --output $(Build.ArtifactStagingDirectory)/app"
              zipAfterPublish: false
          - task: PublishBuildArtifacts@1
            displayName: "📤 Upload Artifacts"
            inputs:
              pathToPublish: "$(Build.ArtifactStagingDirectory)"
              artifactName: "educore-platform"

  - stage: TestSQLite
    displayName: "🧪 Testes SQLite"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: SQLiteTests
        displayName: "34 testes de integração"
        steps:
          - task: DotNetCoreCLI@2
            displayName: "🏃 Rodando testes"
            inputs:
              command: test
              projects: "tests/Financial.IntegrationTests/EduCore.Financial.IntegrationTests.csproj"
              arguments: >
                --configuration Release --no-restore
                --filter "FullyQualifiedName!~Postgres"
                --logger "console;verbosity=detailed"

  - stage: DeployHML
    displayName: "🚀 Deploy HML"
    dependsOn: TestSQLite
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployHML
        displayName: "hml-platform.devgiglio.uk"
        steps:
          - script: |
              curl -s -X POST "$(DOKPLOY_URL)/api/application.deploy" \
                -H "x-api-key: $(DOKPLOY_API_KEY)" \
                -H "Content-Type: application/json" \
                -d '{"applicationId":"$(HML_APP_ID)"}'
              echo "✅ HML deploy disparado!"
            displayName: "Trigger Deploy HML"

  - stage: DeployProd
    displayName: "🌟 Deploy PROD"
    dependsOn: DeployHML
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployProd
        displayName: "platform.devgiglio.uk"
        steps:
          - script: |
              curl -s -X POST "$(DOKPLOY_URL)/api/application.deploy" \
                -H "x-api-key: $(DOKPLOY_API_KEY)" \
                -H "Content-Type: application/json" \
                -d '{"applicationId":"$(PROD_APP_ID)"}'
              echo "✅ PROD deploy disparado!"
            displayName: "Trigger Deploy PROD"
