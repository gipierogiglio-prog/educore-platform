# Azure Pipelines — EduCore Platform
# Pipeline ÚNICA: Build → Test → Deploy (HML + PROD)
# Dokploy fica apenas como hosting (Traefik + containers)

variables:
  - group: educore-platform-vars
    value: 1
    value: "https://dokploy.devgiglio.com"
    value: "EkPqlYG11SnA8Kw7q0wMH"
    value: "9hMNEOpTN5eh-SZ2oTXJR"

trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: 1
  DOKPLOY_URL: "https://dokploy.devgiglio.com"
  PROD_APP_ID: "EkPqlYG11SnA8Kw7q0wMH"
  HML_APP_ID: "9hMNEOpTN5eh-SZ2oTXJR"

stages:
  # ═══════════════════════════════════════════
  # Stage 1: Build
  # ═══════════════════════════════════════════
  - stage: Build
    displayName: "🔨 Build"
    jobs:
      - job: Build
        displayName: "Build + Publish"
        steps:
          - task: DotNetCoreCLI@2
            displayName: "📦 Restore"
            inputs:
              command: restore
              projects: "**/*.csproj"

          - task: DotNetCoreCLI@2
            displayName: "🔨 Build"
            inputs:
              command: build
              projects: "**/*.csproj"
              arguments: "--configuration Release --no-restore"

          - task: DotNetCoreCLI@2
            displayName: "📦 Publish"
            inputs:
              command: publish
              publishWebProjects: false
              projects: "src/api/Gateway/Educore.Api.csproj"
              arguments: "--configuration Release --no-build --output $(Build.ArtifactStagingDirectory)/app"
              zipAfterPublish: false

          - task: PublishBuildArtifacts@1
            displayName: "📤 Upload Artifacts"
            inputs:
              pathToPublish: "$(Build.ArtifactStagingDirectory)"
              artifactName: "educore-platform"

  # ═══════════════════════════════════════════
  # Stage 2: Testes SQLite (34 testes, ~2s)
  # ═══════════════════════════════════════════
  - stage: TestSQLite
    displayName: "🧪 Testes SQLite"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: SQLiteTests
        displayName: "34 testes de integração"
        steps:
          - task: DotNetCoreCLI@2
            displayName: "🏃 Rodando testes"
            inputs:
              command: test
              projects: "tests/Financial.IntegrationTests/EduCore.Financial.IntegrationTests.csproj"
              arguments: >
                --configuration Release
                --no-restore
                --filter "FullyQualifiedName!~Postgres"
                --logger "console;verbosity=detailed"

  # ═══════════════════════════════════════════
  # Stage 3: Testes PostgreSQL (8 testes)
  # ═══════════════════════════════════════════
  - stage: TestPostgreSQL
    displayName: "🐘 Testes PostgreSQL"
    dependsOn: TestSQLite
    condition: succeeded()
    jobs:
      - job: PostgresTests
        displayName: "8 testes de fidelidade"
        services:
          postgres:
            image: postgres:16-alpine
            env:
              POSTGRES_DB: educore_test
              POSTGRES_USER: test
              POSTGRES_PASSWORD: test123
            ports:
              - 5432:5432
        steps:
          - task: DotNetCoreCLI@2
            displayName: "🏃 Rodando testes PG"
            inputs:
              command: test
              projects: "tests/Financial.IntegrationTests/EduCore.Financial.IntegrationTests.csproj"
              arguments: >
                --configuration Release
                --no-restore
                --filter "Database=PostgreSQL"
                --logger "console;verbosity=detailed"

  # ═══════════════════════════════════════════
  # Stage 4: Deploy Homologação
  # ═══════════════════════════════════════════
  - stage: DeployHML
    displayName: "🚀 Deploy HML"
    dependsOn: TestPostgreSQL
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployHML
        displayName: "hml-platform.devgiglio.uk"
        steps:
          - script: |
              echo "🚀 Deploy HML: $(HML_APP_ID)"
              curl -s -X POST "$(DOKPLOY_URL)/api/application.deploy" \
                -H "x-api-key: $(DOKPLOY_API_KEY)" \
                -H "Content-Type: application/json" \
                -d '{"applicationId":"$(HML_APP_ID)"}' && \
              echo "" && echo "✅ HML deploy disparado!"
            displayName: "Trigger Deploy"

  # ═══════════════════════════════════════════
  # Stage 5: Deploy Produção
  # ═══════════════════════════════════════════
  - stage: DeployProd
    displayName: "🌟 Deploy PROD"
    dependsOn: DeployHML
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DeployProd
        displayName: "platform.devgiglio.uk"
        steps:
          - script: |
              echo "🌟 Deploy PROD: $(PROD_APP_ID)"
              curl -s -X POST "$(DOKPLOY_URL)/api/application.deploy" \
                -H "x-api-key: $(DOKPLOY_API_KEY)" \
                -H "Content-Type: application/json" \
                -d '{"applicationId":"$(PROD_APP_ID)"}' && \
              echo "" && echo "✅ PROD deploy disparado!"
            displayName: "Trigger Deploy"

  # ═══════════════════════════════════════════
  # Stage 6: Atualizar Azure DevOps Tasks
  # ═══════════════════════════════════════════
  - stage: UpdateTasks
    displayName: "📋 Atualizar Tasks"
    dependsOn: DeployProd
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: CloseTasks
        displayName: "Fechar tasks no Board"
        steps:
          - script: |
              echo "📋 Fechando tasks do módulo financeiro..."
              for task_id in 150 151 153 154 156 157 160 161 164 165 167 168; do
                RESP=$(curl -s -u ":$(AZURE_PAT)" \
                  -H "Content-Type: application/json-patch+json" \
                  -X PATCH "https://dev.azure.com/$(AZURE_ORG)/$(AZURE_PROJECT)/_apis/wit/workitems/$task_id?api-version=7.1" \
                  -d '[{"op":"add","path":"/fields/System.State","value":"Resolved"}]')
                echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'  ✅ #{d[\"id\"]} -> {d[\"fields\"][\"System.State\"]}')"
              done
            displayName: "Tasks -> Resolved"
            env:
              AZURE_PAT: $(AZURE_PAT)
