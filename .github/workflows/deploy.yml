name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0
      
      - name: Restore
        run: dotnet restore src/api/Gateway/Educore.Api.csproj
      
      - name: Build
        run: dotnet build src/api/Gateway/Educore.Api.csproj -c Release --no-restore
      
      - name: Test
        run: dotnet test --no-build -c Release || echo "Sem testes ainda"
      
      - name: Publish
        run: dotnet publish src/api/Gateway/Educore.Api.csproj -c Release -o /tmp/publish
      
      - name: Deploy via Dokploy API
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          curl -s -X POST "https://dokploy.devgiglio.com/api/application.deploy" \
            -H "accept: application/json" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -d '{"applicationId":"SKQ8mk1WSxr-yu-osbq8n"}'
